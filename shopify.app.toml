# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4b36e615c7828f978b45235c56247d68"
name = "product-imagen-app"
handle = "product-imagen-app"
application_url = "https://strategy-norman-parade-catalogue.trycloudflare.com"
embedded = true

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = ["https://strategy-norman-parade-catalogue.trycloudflare.com/auth/callback", "https://strategy-norman-parade-catalogue.trycloudflare.com/auth/shopify/callback", "https://strategy-norman-parade-catalogue.trycloudflare.com/api/auth/callback"]

[pos]
embedded = false
