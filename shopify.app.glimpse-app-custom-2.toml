# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f1d2855526e8afb2a21850567667f2d4"
name = "glimpse-app-custom-2"
handle = "glimpse-app-custom-2"
application_url = "https://glimpse-app-custom-2.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = false
include_config_on_deploy = true

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://glimpse-app-custom-2.onrender.com/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = [
  "https://glimpse-app-custom-2.onrender.com/auth/callback",
  "https://glimpse-app-custom-2.onrender.com/auth/shopify/callback",
  "https://glimpse-app-custom-2.onrender.com/api/auth/callback",
]

[pos]
embedded = false
