# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "334205d75ffe74323ba7067e44337b94"
name = "glimpse-app-custom"
application_url = "https://glimpse-app-custom.onrender.com"
embedded = true
handle = "glimpse-app-custom"

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  # NOTE: orders/create webhook requires Protected Customer Data approval
  # [[webhooks.subscriptions]]
  # topics = [ "orders/create" ]
  # uri = "/webhooks/orders"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_reports,read_analytics"

[auth]
redirect_urls = [
  "https://glimpse-app-custom.onrender.com/auth/callback",
  "https://glimpse-app-custom.onrender.com/auth/shopify/callback",
  "https://glimpse-app-custom.onrender.com/api/auth/callback"
]

[pos]
embedded = false
